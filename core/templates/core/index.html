{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* ✅ FIXED BACKGROUND */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;
}

/* Main container */

.container{
text-align:center;
padding-top:200px;  
}

/* Title */
.title{
position:absolute;
top:100px;
width:100%;
text-align:center;
font-size:40px;
font-weight:bold;
color:rgb(50, 67, 40);

text-shadow:2px 2px 6px rgba(0,0,0,0.3);
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Subtitle */

.subtitle{
font-size:25px;
margin-bottom:50px;
font-weight:bold;
color: rgb(50, 67, 40);
}

/* Feature boxes */

.feature-box{
background-color:#94d06f;
color:rgb(13, 12, 12);
padding:14px 29px;
border-radius:20px;
display:inline-block;
margin:10px;
font-size:16px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.features{
text-align:center;
margin-top:30px;
}

/* Buttons */
.center-buttons{
text-align:center;
margin-top:40px;
}

.btn{
display:inline-block;
width:180px;
padding:10px;
margin:10px;
border-radius:30px;
font-size:18px;
text-decoration:none;
text-align:center;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.get-btn{
background:linear-gradient(45deg,#6bcf3f,#3da32c);
color:white;
}

.login-btn{
background:white;
color:#2f6b1e;
border:2px solid #4CAF50;
}

.btn:hover{
transform:scale(1.05);
}

.btn:active{
background:#2f6b1e;
color:white;
}

</style>
</head>

<body>
