<!DOCTYPE html>
<html>
<head>
<title>Mill Entry</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
height:100vh;

background-image:url("/media/paddy.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

/* Card */
.form-box{
background:rgba(255,255,255,0.88);
backdrop-filter:blur(8px);
padding:35px;
width:420px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
position:relative;
}

/* Title */
.title{
text-align:center;
font-size:26px;
font-weight:600;
margin-bottom:20px;
color:#2e5e2e;
}

/* Input fields */
input{
width:100%;
padding:11px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#4CAF50;
outline:none;
box-shadow:0 0 4px rgba(76,175,80,0.5);
}

/* Button */
button{
width:100%;
padding:12px;
margin-top:12px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#3c9441;
}

/* Back button (same as farmer page) */
.back-btn{
position:absolute;
top:15px;
left:15px;
background:white;
padding:6px 14px;
border-radius:8px;
text-decoration:none;
color:#333;
font-size:14px;
font-weight:500;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.back-btn:hover{
background:#f1f1f1;
}

/* Messages */
.message{
padding:10px;
margin-bottom:10px;
color:white;
text-align:center;
border-radius:5px;
}

.message.success{
background:#4CAF50;
}

.message.error{
background:#f44336;
}

</style>
</head>


<body>

<div class="form-box">

<a href="/add/" class="back-btn">← Back</a>

<div class="title">
Mill Entry
</div>

{% if messages %}
    {% for message in messages %}
        <div id="msgbox" class="message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="text"
name="owner_name"
placeholder="Mill Owner Name"
pattern="[A-Za-z ]+"
title="Only letters allowed"
required>

<input type="text"
name="mill_name"
placeholder="Mill Name"
pattern="[A-Za-z ]+"
title="Only letters allowed"
oninput="this.value = this.value.replace(/[^A-Za-z ]/g,'')"
required>

<input type="text"
name="mill_address"
placeholder="Mill Address"
pattern="[A-Za-z ]+"
title="Only letters allowed"
oninput="this.value = this.value.replace(/[^A-Za-z ]/g,'')"
required>

<input type="text" name="district"
placeholder="District"
pattern="[A-Za-z ]+"
required>

<input type="tel" name="mobile"
placeholder="Mobile Number"
pattern="[0-9]{10}"
maxlength="10"
required>

<input type="text"
name="paddy_type"
placeholder="Paddy Type"
pattern="[A-Za-z ]+"
title="Only letters allowed"
required>

<input type="text"
name="bags"
placeholder="Total bags (Example: 80 bags(456kgs) or 80 bags(2T))"
pattern="[0-9]+ bags\([0-9]+(kgs|T)\)"
title="Enter format like 80 bags(456kgs) or 80 bags(2T)"
required>

<input type="text" name="lorry"
placeholder="Lorry Number (Example: AP34CG2345)"
pattern="^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9]{1,10}$"
maxlength="10"
style="text-transform:uppercase"
required>

<input type="number" name="amount"
placeholder="Total Amount"
required>

<label>Upload Weight Image</label>
<input type="file" name="image">

<button type="submit">Submit</button>

</form>

</div>
<script>

var msg = document.getElementById("msgbox");

if(msg){

    if(msg.classList.contains("success")){
        setTimeout(function(){
            msg.style.display = "none";
        },3000); // 3 seconds
    }

    if(msg.classList.contains("error")){
        setTimeout(function(){
            msg.style.display = "none";
        },15000); // 15 seconds
    }

}

</script>
</body>
</html>
