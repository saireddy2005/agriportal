<!DOCTYPE html>
<html>

{% load static %}

<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* ✅ SAME BACKGROUND AS SIGNUP */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;
background-position: center;

/* CENTER CONTENT */
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN BOX (UPDATED LIKE 2nd IMAGE) */
.login-box{
background:rgba(255,255,255,0.9);
padding:35px;
border-radius:15px;
text-align:center;
width:320px;

box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

/* TITLE */
.login-box h2{
margin-bottom:20px;
color:#333;
}

/* INPUT FIELDS */
.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* LOGIN BUTTON (GREEN LIKE IMAGE) */
.login-box button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#8bc34a,#4caf50);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* LINKS */
.login-box a{
display:block;
margin-top:10px;
font-size:14px;
color:#333;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Rice Aggregation Service</h2>

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="#">Forgot Password?</a>
<a href="/signup/">New user? Create account</a>
<a href="/">Back</a>

</div>

</body>
</html>
