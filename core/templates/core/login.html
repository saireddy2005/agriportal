<!DOCTYPE html>
<html>

{% load static %}

<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* ✅ SAME BACKGROUND AS SIGNUP PAGE */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;
background-position: center;

/* 🔥 CENTER FORM */
display:flex;
justify-content:center;
align-items:center;
}

/* OPTIONAL: SAME LIGHT OVERLAY EFFECT */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);  /* 🔥 light fade like signup */
z-index:0;
}

/* LOGIN BOX */
.login-box{
position:relative;
z-index:1;
background:rgb(234, 242, 233);
padding:40px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="login-box">

<h2>Rice Aggregation Service</h2>

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="Email" required><br><br>
<input type="password" name="password" placeholder="Password" required><br><br>

<button type="submit">Login</button>

</form>

<br>
<a href="#">Forgot Password?</a><br>
<a href="/signup/">New user? Create account</a>

<br><br>
<a href="/">Back</a>

</div>

</body>
</html>
