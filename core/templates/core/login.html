<!DOCTYPE html>
<html>

{% load static %}

<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN BOX */
.login-box{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

/* TITLE */
.login-box h2{
margin-bottom:20px;
color:#333;
}

/* INPUT */
.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* LOGIN BUTTON */
.login-btn{
width:100%;
padding:10px;
border:none;
border-radius:25px;
background:#8bc34a;
color:white;
font-size:16px;
cursor:pointer;
}

.login-btn:hover{
background:#6fa837;
}

/* LINKS */
.links{
margin-top:10px;
}

/* FORGOT BUTTON */
.forgot-btn{
display:inline-block;
margin-top:10px;
padding:8px 18px;
background:#8bc34a;
color:white;
border-radius:20px;
font-size:14px;
text-decoration:none;
}

.forgot-btn:hover{
background:#6fa837;
}

/* SIGNUP LINK */
.signup-link{
display:block;
margin-top:10px;
color:#333;
text-decoration:none;
}

/* BACK BUTTON */
.back-btn{
display:inline-block;
margin-top:10px;
padding:6px 15px;
background:#8bc34a;
color:white;
border-radius:15px;
font-size:13px;
text-decoration:none;
}

.back-btn:hover{
background:#6fa837;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Rice Aggregation Service</h2>

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit" class="login-btn">Login</button>

</form>

<div class="links">

<a href="/forgot-password/" class="forgot-btn">Forgot Password?</a>

<a href="/signup/" class="signup-link">New user? Create account</a>

</div>

<a href="/" class="back-btn">Back</a>

</div>

</body>
</html>
