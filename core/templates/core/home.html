<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
font-family: Arial;
margin:0;
padding-bottom:70px;

background-image:url("/media/image.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* Title Container */

.container{
text-align:center;
margin-top:10px;
}

/* Advanced Title Design */

.main-title{

font-size:42px;
font-weight:800;
letter-spacing:2px;

color:#1b5e20;

background:rgba(96, 140, 69, 0.25);

display:inline-block;

padding:9px 28px;

border-radius:12px;

backdrop-filter:blur(4px);

text-shadow:2px 2px 6px rgba(0,0,0,0.4);

box-shadow:0 6px 20px rgba(0,0,0,0.25);

transition:0.3s;
}

.main-title:hover{
transform:scale(1.05);
}

/* Activity Section */

.activity-box{
overflow-y:auto;
margin:auto;
width:90%;
max-width:500px;
margin-top:30px;
}

.activity-item{

background:rgba(255,255,255,0.6);

padding:15px;

margin-bottom:15px;

border-radius:12px;

box-shadow:0px 4px 10px rgba(0,0,0,0.2);

font-size:16px;

}

/* Entry Title */

.entry-title{

font-weight:bold;
font-size:18px;
margin-bottom:5px;

}

/* Bottom Navigation */

.bottom-nav{

position: fixed;
bottom: 0;
left: 0;

width: 100%;
height: 55px;

background: rgb(73, 121, 65);

display: flex;
justify-content: space-evenly;
align-items: center;

border-top-left-radius: 15px;
border-top-right-radius: 15px;

box-shadow: 0 -2px 8px rgba(0,0,0,0.2);

}

.bottom-nav a{

text-decoration: none;
color: black;
font-size: 22px;

display: flex;
align-items: center;
justify-content: center;

}

/* Add Button */

.add-btn{

background: rgb(71, 174, 58);

width: 45px;
height: 45px;

border-radius: 50%;

display: flex;
align-items: center;
justify-content: center;

font-size: 24px;

box-shadow: 0px 4px 10px rgba(0,0,0,0.3);

}

</style>
</head>

<body>

<!-- Title -->

<div class="container">
<h1 class="main-title">Prasad Reddy Rice Aggregation Service</h1>
</div>

<!-- Activity List -->



<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="/home/">
<i class="bi bi-house"></i>
</a>

<a href="/stats/">
<i class="bi bi-bar-chart"></i>
</a>

<a href="/add/" class="add-btn">
<i class="bi bi-plus"></i>
</a>

<a href="/notifications/">
<i class="bi bi-bell"></i>
</a>

<a href="/profile/">
<i class="bi bi-person"></i>
</a>

</div>

</body>
</html>
