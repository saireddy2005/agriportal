{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* Background */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

/* ✅ Center everything */
display:flex;
justify-content:center;
align-items:center;
}

/* Main container */
.container{
text-align:center;
width:90%;
max-width:500px;
padding:20px;
z-index:2;
}

/* Title */
.title{
font-size:28px;
font-weight:bold;
color:white;
text-shadow:2px 2px 8px rgba(0,0,0,0.7);
margin-bottom:10px;
}

/* Subtitle */
.subtitle{
font-size:16px;
margin-bottom:25px;
font-weight:bold;
color:white;
}

/* Feature boxes */
.feature-box{
background-color:#94d06f;
color:#111;
padding:12px;
border-radius:20px;
margin:8px auto;
font-size:14px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.2);

/* ✅ Make full width on mobile */
width:100%;
max-width:320px;
}

/* Buttons */
.center-buttons{
margin-top:25px;
}

.btn{
display:block;
width:200px;
padding:10px;
margin:10px auto;
border-radius:30px;
font-size:16px;
text-decoration:none;
text-align:center;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.get-btn{
background:linear-gradient(45deg,#6bcf3f,#3da32c);
color:white;
}

.login-btn{
background:white;
color:#2f6b1e;
border:2px solid #4CAF50;
}

.btn:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

<div class="center-buttons">
<a href="/signup/" class="btn get-btn">Get Started</a>
<a href="/login/" class="btn login-btn">Login</a>
</div>

</div>

</body>
</html>
