{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;

/* FIX SCREEN */
height:100vh;
overflow:hidden;

/* BACKGROUND IMAGE */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

/* CENTER EVERYTHING */
display:flex;
justify-content:center;
align-items:center;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* MAIN CONTAINER */
.container{
text-align:center;
width:90%;
max-width:750px;
z-index:1;
}

/* TITLE */
.title{
font-size:46px;
font-weight:bold;
color:white;
margin-bottom:8px;
}

/* SUBTITLE */
.subtitle{
font-size:17px;
margin-bottom:20px;
color:#ddd;
}

/* FEATURES GRID */
.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

/* FEATURE BOX */
.feature-box{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(8px);
color:white;
padding:10px 12px;
border-radius:12px;
font-size:12px;
text-align:center;
}

/* 2 + 2 LAYOUT */
.feature-box{
flex:1 1 45%;
max-width:45%;
}

/* LAST BOX FULL WIDTH */
.feature-box:nth-child(4){
flex:1 1 90%;
max-width:90%;
}

/* BUTTONS */
.center-buttons{
margin-top:20px;
}

.btn{
display:block;
width:180px;
padding:10px;
margin:8px auto;
border-radius:25px;
font-size:15px;
text-decoration:none;
text-align:center;
font-weight:600;
}

/* GET STARTED (TOP) */
.get-btn{
background:linear-gradient(45deg,#7ed957,#4caf50);
color:white;
}

/* LOGIN (BOTTOM) */
.login-btn{
background:white;
color:#2f6b1e;
}

/* HOVER */
.btn:hover{
transform:scale(1.05);
}

/* MOBILE FIX */
@media (max-width:600px){

.feature-box{
flex:1 1 100%;
max-width:100%;
}

.title{
font-size:22px;
}

.subtitle{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="features">

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

</div>

<div class="center-buttons">

<!-- ✅ BACK TO ORIGINAL ORDER -->
<a href="/signup/" class="btn get-btn">Get Started</a>

<a href="/login/" class="btn login-btn">Login</a>

</div>

</div>

</body>
</html>
