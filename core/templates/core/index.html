{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
min-height:100vh;

/* Background */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

/* Center layout */
display:flex;
justify-content:center;
align-items:center;
}

/* Overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* Container */
.container{
text-align:center;
width:90%;
max-width:750px;
padding:20px;
z-index:1;
}

/* Title */
.title{
font-size:46px;
font-weight:bold;
color:white;
margin-bottom:10px;
text-shadow:2px 2px 8px rgba(0,0,0,0.7);
}

/* Subtitle */
.subtitle{
font-size:17px;
margin-bottom:25px;
color:#ddd;
}

/* FEATURES */
.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:25px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

/* Feature box */
.feature-box{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
color:white;
padding:12px 15px;
border-radius:12px;
font-size:13px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
text-align:center;
}

/* FIRST ROW → 3 equal boxes */
.feature-box:nth-child(1),
.feature-box:nth-child(2),
.feature-box:nth-child(3){
flex:1 1 30%;
max-width:30%;
}

/* SECOND ROW → centered box */
.feature-box:nth-child(4){
flex:0 1 60%;
max-width:60%;
margin-left:auto;
margin-right:auto;
}

/* Buttons */
.center-buttons{
margin-top:30px;
}

.btn{
display:block;
width:200px;
padding:10px;
margin:10px auto;
border-radius:25px;
font-size:16px;
text-decoration:none;
text-align:center;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.get-btn{
background:linear-gradient(45deg,#78dc68,#4dcf5f);
color:white;
}

.login-btn{
background:white;
color:#333;
}

/* Hover */
.btn:hover{
transform:scale(1.05);
}

/* MOBILE */
@media (max-width: 600px){

.feature-box{
flex:1 1 100% !important;
max-width:100% !important;
}

.title{
font-size:24px;
}

.subtitle{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="features">

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

</div>

<div class="center-buttons">
<a href="/signup/" class="btn get-btn">Get Started</a>
<a href="/login/" class="btn login-btn">Login</a>
</div>

</div>

</body>
</html>
