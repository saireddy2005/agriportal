<!DOCTYPE html>

body{

}



/* Main container */

.container{

.title{

.subtitle{

}

}

.get-btn{

}

.login-btn{

color:#2f6b1e;

}

.btn:hover{
transform:scale(1.05);
}

.btn:active{

}

<div class="container">

WELCOME TO PRASAD REDDY PADDY AGGREGATION SERVICE
