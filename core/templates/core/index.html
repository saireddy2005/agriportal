{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* Background */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

/* Center everything */
display:flex;
justify-content:center;
align-items:center;
}

/* Overlay for better visibility (like 2nd image) */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* Main container */
.container{
text-align:center;
width:90%;
max-width:600px;
padding:20px;
z-index:1;
}

/* Title */
.title{
font-size:30px;
font-weight:bold;
color:white;
margin-bottom:10px;
text-shadow:2px 2px 8px rgba(0,0,0,0.7);
}

/* Subtitle */
.subtitle{
font-size:15px;
margin-bottom:25px;
color:#ddd;
}

/* FEATURES GRID */
.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

/* Feature boxes */
.feature-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
color:white;
padding:12px 15px;
border-radius:12px;
font-size:13px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.3);

/* IMPORTANT: 2 per row */
width:45%;
text-align:center;
}

/* Buttons */
.center-buttons{
margin-top:25px;
}

.btn{
display:block;
width:200px;
padding:10px;
margin:10px auto;
border-radius:25px;
font-size:16px;
text-decoration:none;
text-align:center;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* Button styles */
.get-btn{
background:linear-gradient(45deg,#4facfe,#00c6ff);
color:white;
}

.login-btn{
background:white;
color:#333;
}

.btn:hover{
transform:scale(1.05);
}

/* MOBILE FIX */
@media (max-width: 500px){

.feature-box{
width:100%;   /* single column for small screens */
}

.title{
font-size:24px;
}

.subtitle{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="features">

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

</div>

<div class="center-buttons">
<a href="/signup/" class="btn get-btn">Get Started</a>
<a href="/login/" class="btn login-btn">Login</a>
</div>

</div>

</body>
</html>
