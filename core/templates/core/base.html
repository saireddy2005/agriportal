{% load static %}

<!DOCTYPE html><html>
<head><title>AgriPortal</title><style>

body{
margin:0;
padding:0;
width: 100%;
font-family: Arial, Helvetica, sans-serif;


background-size: cover;
background-position: center;
background-repeat: no-repeat;

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

padding:120px;
border-radius:15px;
width:550px;
box-shadow:0px 10px 25px rgba(0,0,0,0.3);
text-align: center;
}

input{
width:70%;
padding:15px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:50%;
padding:12px;
border:none;
border-radius:20px;
background:rgb(176, 245, 126);
color:rgb(16, 9, 9);
font-size:20px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

a{
text-decoration:none;
color:#02b426;
}

</style></head><body><div class="card">{% block content %}

{% endblock %}

</div></body>
</html>
