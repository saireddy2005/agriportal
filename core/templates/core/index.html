{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;

/* FIX SCREEN */
height:100vh;
overflow:hidden;

/* BACKGROUND */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;

/* CENTER */
display:flex;
justify-content:center;
align-items:center;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* CONTAINER */
.container{
text-align:center;
width:90%;
max-width:750px;
z-index:1;
}

/* TITLE (UPDATED STYLE) */
.title{
font-size:46px;
font-weight:700;
color:white;
margin-bottom:8px;
text-shadow: 
0px 2px 8px rgba(0,0,0,0.8),
0px 0px 15px rgba(0,0,0,0.5);
}

/* SUBTITLE */
.subtitle{
font-size:17px;
margin-bottom:18px;
color:#e0e0e0;
text-shadow:0px 2px 6px rgba(0,0,0,0.6);
}

/* FEATURES */
.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

/* BOXES (REDUCED WIDTH) */
.feature-box{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(8px);
color:white;
padding:8px 12px;
border-radius:12px;
font-size:11px;
text-align:center;

flex:0 1 auto;
max-width:260px;
}

/* BUTTONS */
.center-buttons{
margin-top:20px;
}

.btn{
display:block;
width:180px;
padding:10px;
margin:8px auto;
border-radius:25px;
font-size:15px;
text-decoration:none;
text-align:center;
font-weight:600;
}

/* GET STARTED */
.get-btn{
background:linear-gradient(45deg,#62a944,#57bc43);
color:white;
}

/* LOGIN */
.login-btn{
background:white;
color:#2f6b1e;
}

/* HOVER */
.btn:hover{
transform:scale(1.05);
}

/* MOBILE */
@media (max-width:600px){

.feature-box{
max-width:220px;
font-size:11px;
}

.title{
font-size:22px;
}

.subtitle{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="features">

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

</div>

<div class="center-buttons">

<a href="/signup/" class="btn get-btn">Get Started</a>

<a href="/login/" class="btn login-btn">Login</a>

</div>

</div>

</body>
</html>
