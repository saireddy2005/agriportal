<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;

background-image:url("/media/paddy3.jpeg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

/* Notification Box */

.notification-box{
position: relative;
width:520px;
max-height:400px;        /* ✅ added scroll height */
overflow-y:auto;         /* ✅ scroll enabled */

padding:40px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);

border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* Title */

.title{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
color:#0f3d0f;
}

/* Notification item */

.note{

background:rgba(255,255,255,0.45);
padding:12px;
border-radius:8px;
margin-bottom:12px;

}

/* Time */

.time{
font-size:12px;
color:#333;
margin-top:5px;
}

/* Empty */

.empty{
text-align:center;
color:#333;
}

/* Delete Button */

.delete-btn{
background:#ff4d4d;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
transition:0.3s;
}

.delete-btn:hover{
background:#cc0000;
transform:scale(1.1);
}

/* Back Button */

.back-btn{

position:absolute;

top: 15px;
left: 15px;

background:rgba(247, 230, 230, 0.6);
padding:8px 16px;
border-radius:8px;

text-decoration:none;
color:black;
font-weight:bold;

box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;

}

.back-btn:hover{

background:#7ad474;
transform:scale(1.05);

}
/* Scrollbar width */
.notification-box::-webkit-scrollbar {
    width: 8px;
}

/* Scrollbar track (background line) */
.notification-box::-webkit-scrollbar-track {
    background: rgba(79, 62, 62, 0.1);   /* 🔄 change this */
    border-radius: 10px;
}

/* Scrollbar thumb (moving part) */
.notification-box::-webkit-scrollbar-thumb {
    background: #4e5a4e;   /* 🌿 green color */
    border-radius: 10px;
}

/* Hover effect */
.notification-box::-webkit-scrollbar-thumb:hover {
    background: #3b7d3b;
}
</style>
</head>

<body>


<div class="notification-box">
    <a href="{% url 'home' %}" class="back-btn">← Back</a>

<div class="title">
Notifications
</div>


{% if notes %}

{% for n in notes %}

<div class="note">

    <div style="display:flex; justify-content:space-between; align-items:center;">

        <div>
            {{ n.message }}

            <div class="time">
                {{ n.created_at }}
            </div>
        </div>

        <!-- ✅ DELETE BUTTON -->
        <form action="{% url 'delete_notification' n.id %}" method="POST">
            {% csrf_token %}
            <button class="delete-btn">✖</button>
        </form>

    </div>

</div>

{% endfor %}

{% else %}

<div class="empty">
No notifications yet
</div>

{% endif %}

</div>





</body>
</html>
