{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Paddy Aggregation System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

/* ✅ FIXED BACKGROUND */
background: url("{% static 'paddy4.jpeg' %}") no-repeat center center fixed;
background-size: cover;
}

/* Main container */

.container{
text-align:center;
padding-top:100px;
position:relative;
z-index:2;
}

/* Title */
.title{
text-align:center;
font-size:40px;
font-weight:bold;
color:white;

text-shadow:2px 2px 8px rgba(0,0,0,0.7);
margin-top:50px;

font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Subtitle */

.subtitle{
font-size:25px;
margin-bottom:50px;
font-weight:bold;
color:white;
}

/* Feature boxes */

.feature-box{
background-color:#94d06f;
color:rgb(13, 12, 12);
padding:14px 29px;
border-radius:20px;
display:inline-block;
margin:10px;
font-size:16px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.features{
text-align:center;
margin-top:30px;
}

/* Buttons */
.center-buttons{
text-align:center;
margin-top:40px;
}

.btn{
display:inline-block;
width:180px;
padding:10px;
margin:10px;
border-radius:30px;
font-size:18px;
text-decoration:none;
text-align:center;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.get-btn{
background:linear-gradient(45deg,#6bcf3f,#3da32c);
color:white;
}

.login-btn{
background:white;
color:#2f6b1e;
border:2px solid #4CAF50;
}

.btn:hover{
transform:scale(1.05);
}

.btn:active{
background:#2f6b1e;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
Paddy Aggregation Service
</div>

<div class="subtitle">
Collect • Store • Manage — Smart Platform for Rice Aggregator Data 🌾
</div>

<div class="features">

<div class="feature-box">
📄 Store Farmer Paddy Collection Data
</div>

<div class="feature-box">
🏭 Manage Rice Mill Entry Records
</div>

<div class="feature-box">
📊 Track Quantity & Bags Details
</div>

</div>

<div class="features">

<div class="feature-box">
🔍 Access Aggregation Data Anytime
</div>

</div>

<div class="center-buttons">

<a href="/signup/" class="btn get-btn">Get Started</a>
<br>

<a href="/login/" class="btn login-btn">Login</a>

</div>

</div>

</body>
</html>
