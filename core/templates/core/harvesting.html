{% extends 'core/base.html' %}

{% block content %}

<div class="page">

    <div class="card">

        <h2>Harvesting Details</h2>

        <a href="/harvest-farmer/">
            <button class="option-btn">Farmer Entry</button>
        </a>

       <a href="{% url 'harvester_entry' %}">
    <button class="option-btn">Harvester Operator Entry</button>
</a>

        <!-- BACK BUTTON -->
        <a href="/add/">
            <button class="back-btn">Back</button>
        </a>

    </div>

</div>

<style>

/* FULL SCREEN BACKGROUND */
.page{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

  background-image:url("/media/paddy.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD (MATCH ADD PAGE STYLE) */
.card{
    background: rgba(96, 145, 47, 0.2);  /* green transparent */
    padding: 70px;
    width: 440px;
    border-radius: 12px;
    text-align: center;
}

/* TITLE */
.card h2{
    font-size: 30px;
    margin-bottom: 30px;
}

/* BUTTONS (MATCH ADD PAGE) */
.option-btn{
    display: block;
    width: 380px;
    padding: 12px;
    margin: 12px auto;

    background: rgba(255,255,255,0.6);
    color: black;
    font-size: 19px;

    border-radius: 19px;
    border: none;
    cursor: pointer;
}

/* HOVER EFFECT */
.option-btn:hover{
    background:#7ad474;
}

/* BACK BUTTON (POSITION LIKE ADD PAGE) */
.back-btn{
position:absolute;
bottom:180px;
left:47%;
background:rgba(247, 230, 230, 0.6);
padding:10px;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
width: 110px;
text-align: center;
}

/* BACK HOVER */
.back-btn:hover{
    background:#7ad474;
}

</style>

{% endblock %}
