{% extends 'core/base.html' %}

{% block content %}

<div class="page">

    <div class="card">

        <!-- Back Button -->
        <button onclick="history.back()" class="back-btn">← Back</button>

        <h2>Harvester Operator Entry</h2>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            

            <input type="text" name="operator_name" placeholder="Operator Name"
                   pattern="[A-Za-z ]+" required>

            


                   <input type="text" name="machine_number"
placeholder="Machine Number (Example: AP34CG2345)"
pattern="^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9]{1,10}$"
maxlength="10"
title="Enter valid Machine number like AP34CG2345"
style="text-transform:uppercase"
required>

            <input type="date" name="date" required>

          
            

            <div id="farmer-container">

                <div class="row">
                    <input type="text" name="farmer_name[]" placeholder="Farmer Name"
                           pattern="[A-Za-z ]+" required>

                    <input type="text" name="village[]" placeholder="Village"
                           pattern="[A-Za-z ]+" required>

                    <input type="number" step="0.01" name="acres[]" placeholder="Acres" required>

                    <input type="text" name="time[]" placeholder="Total Time" required>

                    <input type="number" name="amount[]" placeholder="Total Amount" required>
                </div>

            </div>

            <!-- Add Button -->
            <button type="button" class="add-btn" onclick="addRow()">+ </button>

            <!-- Upload -->
            <input type="file" name="file_upload">

            <button type="submit" class="submit-btn">Submit</button>

        </form>

    </div>

</div>

<script>
let count = 1;

function addRow() {
    if (count >= 10) {
        alert("Maximum 10 entries allowed");
        return;
    }

    count++;

    let container = document.getElementById("farmer-container");

    let row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
        <input type="text" name="farmer_name[]" placeholder="Farmer Name" pattern="[A-Za-z ]+" required>
        <input type="text" name="village[]" placeholder="Village" pattern="[A-Za-z ]+" required>
        <input type="number" step="0.01" name="acres[]" placeholder="Acres" required>
        <input type="text" name="time[]" placeholder="Total Time" required>
        <input type="number" name="amount[]" placeholder="Total Amount" required>
    `;

    container.appendChild(row);
}
</script>

<script>
document.querySelectorAll(".alert").forEach(function(alert){
    setTimeout(() => alert.style.display = "none", 4000);
});
</script>

<style>

/* BACKGROUND */
.page{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    background-image: url("/media/paddy.jpg");
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 15px;
    width: 600px;
    text-align: center;
    position: relative;

    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
.card input{
    width: 100%;
    padding: 10px;
    margin: 8px 0;

    border-radius: 8px;
    border: 1px solid #ccc;
}

/* ROW (FARMER SIDE BY SIDE) */
.row{
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

/* BUTTONS */
.submit-btn{
    width: 30%;
    padding: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.submit-btn:hover{
    background: #45a049;
}

/* ADD BUTTON */
.add-btn{
   width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #4CAF50;
    color: white;
    border: none;
    font-size: 20px;
   
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;
}

.add-btn-container{
    display: flex;
    justify-content: flex-start;  /* moves to left */
    margin-top: -10px;

}
.add-btn:hover{
    background: darkgreen;
}

/* BACK BUTTON */
.back-btn{
    position: absolute;
    top: 15px;
    left: 15px;
color:#333;
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight:500;
    width: 100px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    transition:0.3s;
    background: white;
}
.back-btn:hover{
    background: #f1f1f1;
}

/* ALERT */
.alert{
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}

.alert.success{
    background: #4CAF50;
}

.alert.error{
    background: red;
}

</style>

{% endblock %}
